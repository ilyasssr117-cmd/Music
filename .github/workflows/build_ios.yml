name: Build iOS IPA

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build unsigned iOS IPA
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go_backend/go.mod
          cache-dependency-path: go_backend/go.sum

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print tool versions
        run: |
          set -euxo pipefail
          flutter --version
          go version
          xcodebuild -version

      # The iOS app links against the gomobile-generated Gobackend.xcframework
      # (see ios/Flutter/*.xcconfig and `import Gobackend` in AppDelegate.swift).
      # It must exist before the Xcode/Flutter build or the Swift compile fails.
      - name: Build Go backend xcframework (Gobackend.xcframework)
        run: |
          set -euxo pipefail
          bash scripts/build_ios.sh
          test -d ios/Frameworks/Gobackend.xcframework

      - name: Install Flutter dependencies
        run: flutter pub get

      # Generates *.g.dart sources (json_serializable, etc.). Running it up front
      # avoids "PhaseScriptExecution" failures caused by missing generated code.
      - name: Run build_runner code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      # The published ffmpeg_kit_flutter_new_full package ships its
      # scripts/*.sh with CRLF line endings; its podspec prepare_command runs
      # setup_ios.sh during `pod install`, which fails with
      # "/bin/bash^M: bad interpreter". Normalize line endings first.
      - name: Normalize ffmpeg_kit_flutter script line endings
        run: |
          set -euxo pipefail
          while IFS= read -r script; do
            perl -i -pe 's/\r$//' "$script"
            chmod +x "$script"
          done < <(find "$HOME/.pub-cache" -path '*ffmpeg_kit_flutter*/scripts/*.sh')

      - name: Install CocoaPods dependencies
        run: |
          set -euxo pipefail
          cd ios
          pod install --repo-update

      - name: Build iOS app (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Verify Runner.app was produced
        run: |
          set -euxo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Expected app bundle not found at $APP_PATH"
            exit 1
          fi
          echo "Runner.app size:"
          du -sh "$APP_PATH"

      - name: Package Runner.app into Spotiflac.ipa
        run: |
          set -euxo pipefail
          BUILD_DIR="build/ios/iphoneos"
          cd "$BUILD_DIR"
          rm -rf Payload Spotiflac.ipa
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          # -y preserves symlinks inside the .app bundle so the IPA stays valid.
          zip -qry Spotiflac.ipa Payload

      - name: Verify Spotiflac.ipa exists and is non-empty
        run: |
          set -euxo pipefail
          IPA_PATH="build/ios/iphoneos/Spotiflac.ipa"
          if [ ! -f "$IPA_PATH" ]; then
            echo "::error::IPA not found at $IPA_PATH"
            exit 1
          fi
          if [ ! -s "$IPA_PATH" ]; then
            echo "::error::IPA at $IPA_PATH is empty"
            exit 1
          fi
          # Sanity-check the archive is a valid, non-trivial zip containing the app.
          unzip -l "$IPA_PATH" | grep -q "Payload/Runner.app/" || {
            echo "::error::IPA does not contain Payload/Runner.app"
            exit 1
          }
          echo "IPA is valid:"
          ls -lh "$IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spotiflac-ipa
          path: build/ios/iphoneos/Spotiflac.ipa
          if-no-files-found: error
          retention-days: 30
